services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_YDy9TPVhB1gU@ep-long-moon-ad8lxqqc.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ../frontend
    ports:
      - "4028:4028"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev -- --hostname 0.0.0.0
    depends_on:
      - backend
